<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Skaner psychologiczny</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        /* Темный Sci-Fi фон с сеткой */
        body {
            -webkit-user-select: none;
            user-select: none;
            -webkit-touch-callout: none;
            overflow: hidden;
            background: radial-gradient(circle at center, #131320 0%, #050508 100%);
        }

        .bg-grid {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background-size: 50px 50px;
            background-image: 
                linear-gradient(to right, rgba(255, 255, 255, 0.02) 1px, transparent 1px),
                linear-gradient(to bottom, rgba(255, 255, 255, 0.02) 1px, transparent 1px);
            z-index: -1;
            pointer-events: none;
        }

        /* Анимация сканера */
        @keyframes scan {
            0% { top: -10%; opacity: 0; }
            15% { opacity: 1; }
            85% { opacity: 1; }
            100% { top: 110%; opacity: 0; }
        }

        .scanning-line {
            display: none;
            position: absolute;
            width: 130%;
            height: 4px;
            background: linear-gradient(90deg, transparent, #0ea5e9, #8b5cf6, #f43f5e, transparent); 
            box-shadow: 0 0 15px 3px rgba(14, 165, 233, 0.8), 0 0 30px rgba(139, 92, 246, 0.8);
            left: -15%;
            border-radius: 50%;
            z-index: 10;
        }

        .is-scanning .scanning-line {
            display: block;
            animation: scan 1.5s cubic-bezier(0.4, 0, 0.2, 1) infinite;
        }

        @keyframes fingerprint-color-shift {
            0% { filter: invert(0.8) sepia(1) saturate(500%) hue-rotate(160deg) drop-shadow(0 0 20px rgba(14, 165, 233, 0.9)); }
            50% { filter: invert(0.8) sepia(1) saturate(500%) hue-rotate(220deg) drop-shadow(0 0 25px rgba(139, 92, 246, 0.9)); }
            100% { filter: invert(0.8) sepia(1) saturate(500%) hue-rotate(290deg) drop-shadow(0 0 25px rgba(244, 63, 94, 0.9)); }
        }

        .is-scanning .fingerprint-icon {
            animation: fingerprint-color-shift 1.5s infinite alternate;
        }
        
        .is-scanning .scanner-bg {
            box-shadow: inset 0 0 30px rgba(14, 165, 233, 0.3), 0 0 40px rgba(139, 92, 246, 0.3);
            border-color: #8b5cf6;
        }

        .fingerprint-icon {
            transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            filter: invert(0.4);
        }

        .scanner-bg {
            transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
        }

        /* Плавное появление экранов */
        .fade-in {
            animation: fadeIn 0.6s cubic-bezier(0.16, 1, 0.3, 1) forwards;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(15px) scale(0.98); }
            to { opacity: 1; transform: translateY(0) scale(1); }
        }

        /* Стилизация кнопок опроса */
        .quiz-btn {
            background: rgba(10, 10, 15, 0.7);
            border: 1px solid #1f2937;
            transition: all 0.3s ease;
        }
        .quiz-btn:hover, .quiz-btn:active {
            border-color: #0ea5e9;
            background: rgba(14, 165, 233, 0.1);
            box-shadow: 0 0 15px rgba(14, 165, 233, 0.3);
            color: #fff;
            transform: translateY(-2px);
        }

        /* Стилизация неонового ползунка (слайдера) */
        input[type=range] {
            -webkit-appearance: none;
            width: 100%;
            background: transparent;
            margin: 20px 0;
        }
        input[type=range]:focus { outline: none; }
        
        input[type=range]::-webkit-slider-runnable-track {
            width: 100%;
            height: 6px;
            cursor: pointer;
            background: #1e1e2f;
            border-radius: 3px;
            border: 1px solid #33334d;
        }
        
        input[type=range]::-webkit-slider-thumb {
            height: 24px;
            width: 24px;
            border-radius: 50%;
            background: #0ea5e9;
            cursor: pointer;
            -webkit-appearance: none;
            margin-top: -10px;
            box-shadow: 0 0 15px 5px rgba(14, 165, 233, 0.5);
            transition: background 0.3s, box-shadow 0.3s;
        }
        
        /* Цвет ползунка меняется в зависимости от эмоции (через JS класс) */
        input[type=range].slider-sad::-webkit-slider-thumb {
            background: #eab308; box-shadow: 0 0 15px 5px rgba(234, 179, 8, 0.5);
        }
        input[type=range].slider-happy::-webkit-slider-thumb {
            background: #f43f5e; box-shadow: 0 0 15px 5px rgba(244, 63, 94, 0.5);
        }

        /* Общий класс для скрытия */
        .screen-hidden { display: none !important; }
    </style>
</head>
<body class="text-white h-screen w-screen flex items-center justify-center font-sans">
    
    <div class="bg-grid"></div>

    <!-- ЭКРАН 0: Старт -->
    <div id="screen-start" class="flex flex-col items-center justify-center w-full h-full p-6 z-10 relative fade-in">
        <button onclick="goToScreen('screen-start', 'screen-q1')" class="px-8 py-4 bg-[#0a0a0f] border border-sky-500/50 hover:border-sky-400 rounded-sm font-bold tracking-[0.2em] uppercase text-sky-400 hover:text-white hover:shadow-[0_0_30px_rgba(14,165,233,0.4)] transition-all duration-300">
            Rozpocznij test
        </button>
    </div>

    <!-- ЭКРАН 1: Опрос (Картинка) -->
    <div id="screen-q1" class="screen-hidden flex-col items-center justify-center w-full max-w-2xl h-full p-6 z-10 relative">
        <div class="mb-8 relative rounded-lg overflow-hidden border border-gray-800 shadow-[0_0_30px_rgba(0,0,0,0.8)]">
            <img src="https://i.redd.it/fllk8zsgcayf1.jpeg" alt="Optical illusion" class="w-full max-h-[40vh] object-cover opacity-90">
            <div class="absolute inset-0 shadow-[inset_0_0_20px_rgba(0,0,0,1)] pointer-events-none"></div>
        </div>
        
        <h2 class="text-xl md:text-2xl font-medium mb-6 text-center text-gray-300 tracking-wide">Co zobaczyłeś jako pierwsze?</h2>
        
        <div class="w-full flex flex-col gap-4">
            <button onclick="goToScreen('screen-q1', 'screen-q2')" class="quiz-btn w-full text-left p-4 md:p-5 rounded-lg text-gray-400 text-sm md:text-base tracking-wide">
                Chłopca rysującego obrazek
            </button>
            <button onclick="goToScreen('screen-q1', 'screen-q2')" class="quiz-btn w-full text-left p-4 md:p-5 rounded-lg text-gray-400 text-sm md:text-base tracking-wide">
                Mężczyznę
            </button>
        </div>
    </div>

    <!-- ЭКРАН 2: Опрос (Текст) -->
    <div id="screen-q2" class="screen-hidden flex-col items-center justify-center w-full max-w-3xl h-full p-6 z-10 relative">
        <h2 class="text-lg md:text-xl font-medium mb-8 text-center text-gray-300 tracking-wide leading-relaxed">
            Jak reagujesz na ostre dźwięki lub nagłe powiadomienia w telefonie?
        </h2>
        
        <div class="w-full flex flex-col gap-3 md:gap-4">
            <button onclick="goToScreen('screen-q2', 'screen-q3')" class="quiz-btn w-full text-left p-4 rounded-lg text-gray-400 text-sm md:text-base leading-snug">
                Natychmiast się spinam, zamieram w środku lub zaczynam się irytować.
            </button>
            <button onclick="goToScreen('screen-q2', 'screen-q3')" class="quiz-btn w-full text-left p-4 rounded-lg text-gray-400 text-sm md:text-base leading-snug">
                Odczuwam absolutną apatię, chcę po prostu wyłączyć dźwięk i ukryć się przed szumem informacyjnym.
            </button>
            <button onclick="goToScreen('screen-q2', 'screen-q3')" class="quiz-btn w-full text-left p-4 rounded-lg text-gray-400 text-sm md:text-base leading-snug">
                Wzdrygam się lub odczuwam niepokój, ale szybko zmuszam się do opanowania.
            </button>
            <button onclick="goToScreen('screen-q2', 'screen-q3')" class="quiz-btn w-full text-left p-4 rounded-lg text-gray-400 text-sm md:text-base leading-snug">
                Spokojnie, reaguję obojętnie i po prostu sprawdzam, co przyszło.
            </button>
        </div>
    </div>

    <!-- ЭКРАН 3: Опрос (Слайдер) -->
    <div id="screen-q3" class="screen-hidden flex-col items-center justify-center w-full max-w-md h-full p-6 z-10 relative">
        <h2 class="text-xl md:text-2xl font-medium mb-12 text-center text-gray-300 tracking-wide">
            Wybierz, jak się czujesz w środku:
        </h2>
        
        <!-- Картинка эмоции -->
        <div class="relative w-48 h-48 md:w-56 md:h-56 mb-10 flex items-center justify-center">
            <div class="absolute inset-0 bg-sky-500/20 rounded-3xl blur-xl transition-all duration-300" id="emotion-glow"></div>
            <img id="emotion-img" src="https://i.ibb.co/XZpLmgQv/bormal.png" alt="Emotion" class="w-full h-full object-cover rounded-3xl relative z-10 shadow-[0_20px_40px_rgba(0,0,0,0.6)] border border-gray-700/50 transition-opacity duration-200">
        </div>

        <!-- Слайдер -->
        <div class="w-full px-4 mb-12">
            <input type="range" min="-100" max="100" value="0" id="emotion-slider">
        </div>
        
        <button onclick="goToScreen('screen-q3', 'screen-scan')" class="px-8 py-3 border border-gray-700 hover:border-sky-500 bg-[#0a0a0f] text-gray-400 hover:text-sky-400 rounded-sm tracking-[0.2em] uppercase transition-all duration-300 hover:shadow-[0_0_20px_rgba(14,165,233,0.3)]">
            Dalej
        </button>
    </div>

    <!-- ЭКРАН 4: Сканер отпечатка (текст убран) -->
    <div id="screen-scan" class="screen-hidden flex-col items-center justify-center w-full h-full p-6 z-10 relative">
        <div class="relative flex flex-col items-center justify-center">
            
            <svg class="absolute w-64 h-64 pointer-events-none animate-[spin_10s_linear_infinite] opacity-40" viewBox="0 0 100 100">
                <circle cx="50" cy="50" r="48" fill="none" stroke="#0ea5e9" stroke-width="0.5" stroke-dasharray="4 8"/>
                <circle cx="50" cy="50" r="42" fill="none" stroke="#8b5cf6" stroke-width="1" stroke-dasharray="20 10 5 10"/>
            </svg>
            <svg class="absolute w-56 h-56 pointer-events-none animate-[spin_15s_linear_infinite_reverse] opacity-30" viewBox="0 0 100 100">
                <circle cx="50" cy="50" r="46" fill="none" stroke="#f43f5e" stroke-width="0.5" stroke-dasharray="2 4"/>
            </svg>

            <button id="fingerprint-btn" class="relative w-40 h-40 flex items-center justify-center rounded-full bg-[#0a0a0f] border-2 border-gray-800 scanner-bg outline-none focus:outline-none cursor-pointer active:scale-95 z-20">
                <img src="https://cdn-icons-png.flaticon.com/512/2313/2313362.png" alt="Fingerprint" class="fingerprint-icon w-20 h-20 object-contain pointer-events-none" draggable="false">
                <div class="scanning-line"></div>
            </button>
            
            <svg class="absolute w-44 h-44 pointer-events-none z-30" viewBox="0 0 100 100" style="filter: drop-shadow(0 0 8px rgba(139, 92, 246, 0.6));">
                <defs>
                    <linearGradient id="circleGrad" x1="0%" y1="0%" x2="100%" y2="100%">
                        <stop offset="0%" stop-color="#0ea5e9" />
                        <stop offset="50%" stop-color="#8b5cf6" />
                        <stop offset="100%" stop-color="#f43f5e" />
                    </linearGradient>
                </defs>
                <circle cx="50" cy="50" r="49" fill="none" stroke="url(#circleGrad)" stroke-width="2.5" stroke-linecap="round" stroke-dasharray="308" stroke-dashoffset="308" id="progress-circle" class="origin-center -rotate-90"/>
            </svg>
        </div>
    </div>

    <!-- ЭКРАН 5: Спидометр (текст убран) -->
    <div id="screen-result" class="screen-hidden flex-col items-center justify-center w-full h-full p-6 z-10 relative">
        <div class="relative w-80 h-48 md:w-[480px] md:h-[280px] mb-6 fade-in" style="animation-delay: 0.1s; opacity: 0;">
            <svg viewBox="0 0 240 140" class="w-full h-full overflow-visible">
                <defs>
                    <linearGradient id="neonGrad" x1="0%" y1="0%" x2="100%" y2="0%">
                        <stop offset="0%" stop-color="#0ea5e9" />
                        <stop offset="50%" stop-color="#8b5cf6" />
                        <stop offset="100%" stop-color="#f43f5e" />
                    </linearGradient>
                    <filter id="neonGlow" x="-20%" y="-20%" width="140%" height="140%">
                        <feGaussianBlur stdDeviation="3" result="blur" />
                        <feComposite in="SourceGraphic" in2="blur" operator="over" />
                    </filter>
                    <filter id="intenseGlow" x="-50%" y="-50%" width="200%" height="200%">
                        <feGaussianBlur stdDeviation="6" result="blur" />
                        <feComposite in="SourceGraphic" in2="blur" operator="over" />
                    </filter>
                </defs>

                <path d="M 20 120 A 100 100 0 0 1 220 120" fill="none" stroke="#131320" stroke-width="12" stroke-linecap="round" />
                <path d="M 20 120 A 100 100 0 0 1 220 120" fill="none" stroke="#33334d" stroke-width="16" stroke-dasharray="2 8" />
                <path id="active-track" d="M 20 120 A 100 100 0 0 1 220 120" fill="none" stroke="url(#neonGrad)" stroke-width="12" stroke-linecap="round" filter="url(#neonGlow)" stroke-dasharray="314.16" stroke-dashoffset="314.16" style="transition: stroke-dashoffset 3s cubic-bezier(0.16, 1, 0.3, 1);" />
                <path d="M 40 120 A 80 80 0 0 1 200 120" fill="none" stroke="#1e1e2f" stroke-width="1" stroke-dasharray="4 4" />

                <g id="gauge-needle" style="transform-origin: 120px 120px; transform: rotate(-90deg); transition: transform 3s cubic-bezier(0.16, 1, 0.3, 1);">
                    <path d="M 118 120 L 118 40 L 120 28 L 122 40 L 122 120 Z" fill="url(#neonGrad)" filter="url(#intenseGlow)" opacity="0.5"/>
                    <path d="M 119 120 L 119 40 L 120 30 L 121 40 L 121 120 Z" fill="#ffffff" />
                    <circle cx="120" cy="120" r="10" fill="#050508" stroke="#8b5cf6" stroke-width="3" filter="url(#neonGlow)"/>
                    <circle cx="120" cy="120" r="3" fill="#ffffff"/>
                </g>
            </svg>
            
            <div class="absolute bottom-[22%] w-full text-center pointer-events-none">
                <span class="text-6xl md:text-8xl font-black text-transparent bg-clip-text bg-gradient-to-r from-sky-300 via-fuchsia-300 to-rose-300 block drop-shadow-[0_0_15px_rgba(244,63,94,0.6)] font-mono tracking-tighter" id="score-text">0</span>
            </div>
        </div>
        
        <!-- Плашка результата (появляется после анимации) -->
        <div id="help-banner" class="opacity-0 scale-95 transition-all duration-700 ease-out mt-4 px-8 py-4 bg-red-950/40 border border-red-500/50 rounded-xl shadow-[0_0_30px_rgba(239,68,68,0.3)] pointer-events-none">
            <p class="text-xl md:text-2xl font-black text-red-500 tracking-[0.1em] uppercase text-center animate-pulse drop-shadow-[0_0_8px_rgba(239,68,68,0.8)]">
                Potrzebujesz pomocy!!
            </p>
        </div>
    </div>

    <script>
        // --- ЛОГИКА ПЕРЕХОДА МЕЖДУ ЭКРАНАМИ ---
        function goToScreen(hideId, showId) {
            const hideEl = document.getElementById(hideId);
            const showEl = document.getElementById(showId);
            
            hideEl.classList.add('screen-hidden');
            hideEl.classList.remove('flex');
            
            showEl.classList.remove('screen-hidden');
            showEl.classList.add('flex', 'fade-in');
        }

        // --- ЛОГИКА СЛАЙДЕРА (ЭКРАН 3) ---
        const emotionSlider = document.getElementById('emotion-slider');
        const emotionImg = document.getElementById('emotion-img');
        const emotionGlow = document.getElementById('emotion-glow');

        // URL картинок
        const imgSad = "https://i.ibb.co/CptdkVbv/depositphotos-46475865-stock-photo-yellow-smiley-symbols.png";
        const imgNormal = "https://i.ibb.co/XZpLmgQv/bormal.png";
        const imgHappy = "https://i.ibb.co/Q7Vr368z/happy.png";

        // Предзагрузка изображений (чтобы не было мерцания при первом свайпе)
        [imgSad, imgNormal, imgHappy].forEach(src => {
            const img = new Image();
            img.src = src;
        });

        emotionSlider.addEventListener('input', (e) => {
            const val = parseInt(e.target.value);
            
            // Сбрасываем классы цветов ползунка
            emotionSlider.classList.remove('slider-sad', 'slider-happy');

            if (val < -33) {
                // Левая сторона
                if (emotionImg.src !== imgSad) emotionImg.src = imgSad;
                emotionSlider.classList.add('slider-sad');
                emotionGlow.style.backgroundColor = 'rgba(234, 179, 8, 0.2)'; // Желтый отблеск
            } else if (val > 33) {
                // Правая сторона
                if (emotionImg.src !== imgHappy) emotionImg.src = imgHappy;
                emotionSlider.classList.add('slider-happy');
                emotionGlow.style.backgroundColor = 'rgba(244, 63, 94, 0.2)'; // Розовый/красный отблеск
            } else {
                // Центр
                if (emotionImg.src !== imgNormal) emotionImg.src = imgNormal;
                // Без дополнительного класса ползунок стандартный (голубой)
                emotionGlow.style.backgroundColor = 'rgba(14, 165, 233, 0.1)'; // Голубой отблеск
            }
        });

        // --- ЛОГИКА СКАНЕРА И СПИДОМЕТРА (ЭКРАНЫ 4 и 5) ---
        const btn = document.getElementById('fingerprint-btn');
        const progressCircle = document.getElementById('progress-circle');
        const screenScan = document.getElementById('screen-scan');
        const screenResult = document.getElementById('screen-result');
        const needle = document.getElementById('gauge-needle');
        const activeTrack = document.getElementById('active-track');
        const scoreText = document.getElementById('score-text');

        let animationFrameId;
        let startTime = null;
        const scanTime = 2500; 
        const maxCircumference = 308; 
        const trackLength = 314.16; 
        let isScanning = false;
        let scanCompleted = false;

        function scanAnimation(timestamp) {
            if (!startTime) startTime = timestamp;
            let elapsedTime = timestamp - startTime;
            if (!isScanning) return; 

            let percentage = Math.min(elapsedTime / scanTime, 1);
            let offset = maxCircumference - (percentage * maxCircumference);
            progressCircle.style.strokeDashoffset = offset;

            if (percentage < 1) {
                animationFrameId = requestAnimationFrame(scanAnimation);
            } else {
                scanCompleted = true;
                setTimeout(completeScan, 300);
            }
        }

        function startScan(e) {
            if (e.type === 'touchstart') e.preventDefault();
            if (isScanning || scanCompleted) return;
            
            isScanning = true;
            btn.classList.add('is-scanning');
            startTime = null; 
            
            animationFrameId = requestAnimationFrame(scanAnimation);
        }

        function stopScan() {
            if (!isScanning || scanCompleted) return;
            
            isScanning = false;
            cancelAnimationFrame(animationFrameId);
            
            btn.classList.remove('is-scanning');
            progressCircle.style.strokeDashoffset = maxCircumference;
        }

        function completeScan() {
            isScanning = false;
            btn.classList.remove('is-scanning');
            
            goToScreen('screen-scan', 'screen-result');

            setTimeout(() => {
                const targetPercentage = 98; 
                const targetRotation = (180 * (targetPercentage / 100)) - 90;
                needle.style.transform = `rotate(${targetRotation}deg)`;
                activeTrack.style.strokeDashoffset = trackLength - (trackLength * (targetPercentage / 100));
                
                animateNumbers(0, targetPercentage, 3000);
                
                // Показываем плашку после завершения анимации спидометра
                setTimeout(() => {
                    const banner = document.getElementById('help-banner');
                    if (banner) {
                        banner.classList.remove('opacity-0', 'scale-95');
                        banner.classList.add('opacity-100', 'scale-100');
                    }
                }, 3000);
            }, 400); 
        }

        function animateNumbers(start, end, duration) {
            let startTimestamp = null;
            const step = (timestamp) => {
                if (!startTimestamp) startTimestamp = timestamp;
                const progress = Math.min((timestamp - startTimestamp) / duration, 1);
                
                const easeProgress = progress === 1 ? 1 : 1 - Math.pow(2, -10 * progress);
                const currentNumber = Math.floor(easeProgress * (end - start) + start);
                
                scoreText.textContent = currentNumber.toString().padStart(2, '0');
                
                if (progress < 1) {
                    window.requestAnimationFrame(step);
                } else {
                    scoreText.textContent = end.toString();
                }
            };
            window.requestAnimationFrame(step);
        }

        // События для сканера
        btn.addEventListener('mousedown', startScan);
        btn.addEventListener('mouseup', stopScan);
        btn.addEventListener('mouseleave', stopScan);
        btn.addEventListener('touchstart', startScan, {passive: false});
        btn.addEventListener('touchend', stopScan);
        btn.addEventListener('touchcancel', stopScan);
    </script>
</body>
</html>
